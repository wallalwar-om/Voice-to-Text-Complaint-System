{% extends "base.html" %}
{% block content %}

<a href="/" class="btn btn-outline-light position-absolute top-0 start-0 m-3">
  ← Back
</a>


<div class="container-fluid min-vh-100 d-flex align-items-center register-bg">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
      <div class="form-wrapper shadow-lg">
        <h2 class="text-center mb-4 fw-bold">Register Complaint</h2>
        <form method="POST" action="/register" enctype="multipart/form-data">

          <div class="mb-3">
            <label for="category" class="form-label">Complaint Category</label>
            <select class="form-select" name="category" id="category" required>
              <option value="">Select a category </option>
              <option value="Water">Water</option>
              <option value="Electricity">Electricity</option>
              <option value="Roads">Roads</option>
              <option value="Garbage">Garbage</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="language" class="form-label">Complaint Category</label>
            <select class="form-select" name="language" id="language" required>
              <option value="">Language</option>
              <option value="en-IN">English</option>
              <option value="hi-IN">Hindi</option>
              <option value="mr-IN">Marathi</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Upload Audio File</label>
            <input type="file" name="audio_file" class="form-control" accept="audio/*" required />
          </div>

          <button type="submit" class="btn btn-primary w-100">Submit Complaint</button>
        </form>

      </div>
    </div>
  </div>
</div>

<script>
  function validateFileSize(input) {
    if (input.files[0].size > 10 * 1024 * 1024) { //10 MB
      alert("Audio file must be under 10MB.");
      input.value = "";  // Clear input
    }
  }
</script>
<script>
  // ✅ Show alert only once after redirect, then remove ?submitted=true from the URL
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('submitted') === 'true') {
    alert("✅ Complaint submitted successfully!");

    // Remove the submitted=true param without refreshing the page
    const url = new URL(window.location);
    url.searchParams.delete('submitted');
    window.history.replaceState({}, document.title, url);
  }
</script>
{% endblock %}
