<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SpeakUpp</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../static/styles.css" rel="stylesheet" />
  </head>
  <body>
    <header class="p-3 bg-dark text-white">
      <div class="container d-flex justify-content-center align-items-center">
        <a href="/" class="text-white text-decoration-none text-center">
            <img src="../static/speakupp-logo.png" alt="SpeakUpp Logo" class="navbar-logo" />
        </a>
      </div>
    </header>
      <!-- Hero Section (inserted after header) -->
      <div class="container my-5">
        <div class="row p-4 pb-0 pe-lg-0 pt-lg-5 align-items-center rounded-3 border shadow-lg">
          <!-- Left Text Section -->
          <div class="col-lg-7 p-3 p-lg-5 pt-lg-3">
            <h1 class="display-4 fw-bold lh-1">Raise Your Voice, Report the Issue</h1>
            <p class="lead">
              SpeakUpp helps you submit complaints on issues like water supply, electricity, sanitation, and more—all through a voice-enabled interface. Join us in making local governance better by making your voice heard!
            </p>
          </div>
      
          <!-- Right Section: Button Replacing Image -->
          <div class="col-lg-4 offset-lg-1 d-flex justify-content-center align-items-center">
            <a href="/register" class="btn btn-warning btn-lg fw-bold px-4 py-3">Register Complaint</a>
          </div>
        </div>
      </div>
      
  </body>
</html>
